spring.application.name=plataforma-reserva
# ===============================
# = DATA SOURCE (MySQL)
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/plataforma_reserva?useSSL=false&serverTimezone=UTC
spring.datasource.username=tu_user
spring.datasource.password=tu_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# = JPA / HIBERNATE
# ===============================
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# create, update, validate, none
spring.jpa.hibernate.ddl-auto=update

# Mostrar queries en consola
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true


# ===============================
server.port=8080
